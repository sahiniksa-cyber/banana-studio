<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استوديو الصور — توليد بقالب موحّد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- القائمة الجانبية -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/>
          </svg>
        </span>
        <span class="name">استوديو الصور<small>توليد بقالب موحّد</small></span>
      </div>

      <button class="nav-item active" data-view="batches">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>
        المكتبة
      </button>
      <button class="nav-item" data-view="new-batch">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        دفعة جديدة
      </button>
      <button class="nav-item" data-view="templates">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>
        القوالب المحفوظة
      </button>

      <div class="spacer"></div>

      <button class="nav-item" data-view="settings">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        الإعدادات
      </button>

      <div class="side-note">استوديو الصور · نسخة أولى</div>
    </aside>

    <!-- المحتوى -->
    <main class="main" id="main"></main>
  </div>

  <!-- نافذة التعديل -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modal-title">تعديل الصورة</h3>
        <button class="close-x" onclick="closeModal()" aria-label="إغلاق">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="compare">
          <div class="label-sm">الصورة الأصلية</div>
          <div class="frame"><img id="modal-original" src="" alt=""></div>
        </div>
        <div class="compare">
          <div class="label-sm">النتيجة <span id="brush-hint" style="color:var(--muted-2);font-weight:400"></span></div>
          <div class="frame" id="result-frame">
            <img id="modal-result" src="" alt="">
            <canvas id="mask-canvas" class="mask-canvas"></canvas>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <div id="modal-error" class="modal-error hidden"></div>
        <div class="brush-bar">
          <button class="btn ghost sm" id="brush-toggle" onclick="toggleBrush()">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
            تحديد منطقة
          </button>
          <div class="tool-group" id="tool-group">
            <button class="tool active" data-tool="brush" onclick="setTool('brush')" title="فرشاة">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08"/><path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z"/></svg>
            </button>
            <button class="tool" data-tool="rect" onclick="setTool('rect')" title="مستطيل">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
            </button>
            <button class="tool" data-tool="erase" onclick="setTool('erase')" title="ممحاة">
              <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
            </button>
          </div>
          <span class="brush-size-wrap">الحجم
            <input type="range" id="brush-size" min="10" max="120" value="40"></span>
          <button class="btn ghost sm" onclick="selectAllMask()">تحديد الكل</button>
          <button class="btn ghost sm" id="clear-mask" onclick="clearMask()">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            مسح
          </button>
        </div>
        <label>اكتب التعديل المطلوب فقط — يُطبَّق على الصورة الحالية دون تغيير الباقي (اتركه فارغًا لإعادة توليد بنفس وصفة الدفعة)</label>
        <textarea id="modal-prompt" placeholder="مثال: خلّي الظل أخف · اجعل الخلفية أفتح قليلًا · شيل الانعكاس"></textarea>
        <div class="row" style="justify-content:flex-start">
          <button class="btn" id="regen-btn" onclick="regenerate()">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            إعادة توليد
          </button>
          <a class="btn ghost" id="dl-single" href="#" download>
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            تحميل النتيجة
          </a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
